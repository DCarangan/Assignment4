version: "3.9"

services:
  nodejs:
    build:
      context: ./node-app
      dockerfile: Dockerfile
    container_name: nodejs
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_USERNAME=${MONGO_USERNAME}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_HOSTNAME=db
      - MONGO_PORT=27017
      - MONGO_DB=sharkinfo
    ports:
      - "8080:8080"
    volumes:
      - ./node-app:/home/node/app
      - node_modules:/home/node/app/node_modules
    depends_on:
      - db
    networks:
      - app-network
    command: npm run dev

  db:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - dbdata:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
  node_modules:
